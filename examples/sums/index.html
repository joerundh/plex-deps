<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>Example: Sum of squares</title>
	</head>
	<body style="background-color: #303030;">
		<script type="module">

			import Plex from "../../dist/index.js";

			const x = new Plex(0);

			const y = Plex.define([ x ], a => a + 1);
			const z = Plex.define([ x, y ], (a, b) => a + b);

			const sum = Plex.define([ x, y, z ], (a, b, c) => a*b*c/6);

			const sums = new Array(10).fill(0).map((_, index) => {
				const n = index + 1;
				x.value = n;
				return sum.value;
			});

			console.log(sums);

		</script>
	</body>
</html>
