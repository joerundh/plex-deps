<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>Diamond diagram with feedback</title>
	</head>
	<body style="background-color: #303030;">
		<script type="module">

			import Plex from "../../dist/index.js";

			let counter;

			const a = new Plex();
			const b = new Plex();
			const c = new Plex();
			const d = new Plex();
			const e = new Plex();
			const f = new Plex();

			Plex.relate(b, [ a ], (x) => counter++);
			Plex.relate(c, [ a ], (x) => counter++);
			Plex.relate(d, [ b ], (x) => counter++);
			Plex.relate(e, [ c ], (x) => counter++);
			Plex.relate(f, [ d ], (x) => counter++);
			Plex.relate(f, [ e ], (x) => counter++);
			Plex.relate(c, [ f ], (x) => counter++);

			counter = 0;
			
			a.value = counter++;

			console.log({ "a": a.value, "b": b.value, "c": c.value, "d": d.value, "e": e.value, "f": f.value });
			// Output: {a: 0, b: 1, c: 2, d: 3, e: 4, f: 5 }

		</script>
	</body>
</html>
